<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pink-purple gradient circular background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6200EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF007A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="50" fill="url(#grad)" />
  <!-- Washing machine body -->
  <rect x="22" y="25" width="56" height="55" rx="7" ry="7" fill="white" opacity="0.95"/>
  <!-- Door circle -->
  <circle cx="50" cy="57" r="17" fill="none" stroke="#6200EA" stroke-width="4"/>
  <circle cx="50" cy="57" r="9" fill="#FF007A" opacity="0.7"/>
  <!-- Control panel dots -->
  <circle cx="32" cy="35" r="4" fill="#FF007A"/>
  <circle cx="44" cy="35" r="4" fill="#6200EA"/>
  <!-- Shine effect -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
